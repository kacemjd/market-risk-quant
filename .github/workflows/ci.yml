name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and verify
        run: mvn clean verify -Plocal

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: >-
            market-risk-business/target/site/jacoco/jacoco.xml,
            market-risk-workflow/target/site/jacoco/jacoco.xml,
            market-risk-processing/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

