spring:
  application:
    name: market-risk-processing
  main:
    # Spark manages its own web UI; disable Spring's embedded server unless needed
    web-application-type: none
  jackson:
    serialization:
      write-dates-as-timestamps: false

spark:
  app-name: market-risk-processing
  # Override to yarn or spark://<host>:7077 in production
  master: local[*]

logging:
  level:
    root: INFO
    com.kacemrisk.market.infrastructure: DEBUG
    com.kacemrisk.market.domain: DEBUG

# Scheduler — disabled by default; enable per environment
scenario:
  schedule:
    enabled: false
    cron: "0 0 18 * * MON-FRI"
    default-portfolio-path: data/portfolio.csv
    default-prices-path: data/prices
    default-confidence-level: 0.99
    default-num-paths: 10000
  kafka:
    topic: scenario-notifications

---
# Local developer profile — activate with -Plocal (Maven) or --spring.profiles.active=local
# Spark runs in-process (local[*]); no cluster, no Kafka required.
spring:
  config:
    activate:
      on-profile: local
  main:
    web-application-type: servlet   # expose REST endpoint for manual testing

server:
  port: 8080

spark:
  master: local[*]

logging:
  level:
    com.kacemrisk.market: DEBUG     # verbose domain + infrastructure output

---
# REST profile — activate with --spring.profiles.active=rest
spring:
  config:
    activate:
      on-profile: rest
  main:
    web-application-type: servlet

server:
  port: 8080

---
# Kafka profile — activate with --spring.profiles.active=kafka
spring:
  config:
    activate:
      on-profile: kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: market-risk-processing
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

var:
  results:
    kafka:
      topic: ${VAR_RESULTS_TOPIC:var-results}

---
# QuestDB profile — activate with --spring.profiles.active=local,questdb
# Connects via the PostgreSQL wire protocol (port 8812).
# Run QuestDB: docker compose up questdb
spring:
  config:
    activate:
      on-profile: questdb
  datasource:
    url: ${QUESTDB_URL:jdbc:postgresql://localhost:8812/questdb}
    username: ${QUESTDB_USER:admin}
    password: ${QUESTDB_PASSWORD:quest}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 5000

