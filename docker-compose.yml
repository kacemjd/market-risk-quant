services:

  questdb:
    image: questdb/questdb:8.2.1
    container_name: market-risk-questdb
    ports:
      - "9000:9000"   # REST API + web console  →  http://localhost:9000
      - "9009:9009"   # InfluxDB line protocol
      - "8812:8812"   # PostgreSQL wire protocol  →  jdbc:postgresql://localhost:8812/questdb
    environment:
      QDB_CAIRO_COMMIT_LAG: 1000
      QDB_LINE_TCP_MAINTENANCE_JOB_INTERVAL: 100
    volumes:
      - questdb-data:/root/.questdb
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.2.18
    container_name: market-risk-redpanda
    ports:
      - "9092:9092"   # Kafka wire protocol
      - "9644:9644"   # Admin API
      - "8081:8081"   # Schema Registry
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://localhost:9092
      - --set redpanda.enable_transactions=true
      - --set redpanda.enable_idempotence=true
      - --set redpanda.auto_create_topics_enabled=true
    healthcheck:
      test: [ "CMD", "rpk", "cluster", "info" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  questdb-data:

